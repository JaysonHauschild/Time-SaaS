<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Time</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #user-corner {
            position: fixed;
            top: 12px;
            right: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: sans-serif;
        }
        #user-corner img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        #login-btn {
            padding: 8px 14px;
            background: #4285F4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #logout-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Auth modal */
        #auth-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        #auth-box {
            background: #fff;
            border-radius: 8px;
            padding: 28px 32px;
            width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            font-family: sans-serif;
            position: relative;
        }
        #auth-box h2 {
            margin: 0 0 18px;
            font-size: 18px;
        }
        #auth-close {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        #google-login-btn {
            width: 100%;
            padding: 9px;
            background: #4285F4;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 16px 0;
            color: #aaa;
            font-size: 13px;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }
        .auth-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 14px;
            border-bottom: 1px solid #e0e0e0;
        }
        .auth-tab {
            flex: 1;
            padding: 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .auth-tab.active {
            color: #4285F4;
            border-bottom-color: #4285F4;
            font-weight: 600;
        }
        .auth-form input {
            width: 100%;
            padding: 8px 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .auth-form button[type="submit"] {
            width: 100%;
            padding: 9px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        #auth-error {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- User corner -->
    <div id="user-corner">
        <div id="logged-out">
            <button id="login-btn" onclick="showAuthModal()">Login</button>
        </div>
        <div id="logged-in" style="display:none; align-items:center; gap:10px;">
            <img id="user-photo" src="" alt="avatar">
            <span id="user-name"></span>
            <button id="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Auth modal -->
    <div id="auth-overlay" onclick="handleOverlayClick(event)">
        <div id="auth-box">
            <button id="auth-close" onclick="closeAuthModal()">&#x2715;</button>
            <h2>Sign in</h2>

            <button id="google-login-btn" onclick="window.location='/auth/google'">
                Continue with Google
            </button>

            <div class="auth-divider">or</div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="showTab('login')">Login</button>
                <button class="auth-tab" id="tab-register" onclick="showTab('register')">Register</button>
            </div>

            <!-- Login form -->
            <form id="login-form" class="auth-form" onsubmit="localLogin(event)">
                <input type="text" name="username" placeholder="Username" autocomplete="username" required>
                <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                <button type="submit">Login</button>
            </form>

            <!-- Register form -->
            <form id="register-form" class="auth-form" style="display:none" onsubmit="localRegister(event)">
                <input type="text" name="displayName" placeholder="Display name" autocomplete="name" required>
                <input type="text" name="username" placeholder="Username" autocomplete="username" required>
                <input type="email" name="email" placeholder="Email (optional)" autocomplete="email">
                <input type="password" name="password" placeholder="Password (min 8 chars)" autocomplete="new-password" required minlength="8">
                <button type="submit">Create account</button>
            </form>

            <p id="auth-error"></p>
        </div>
    </div>

    <div id="content">
        <h2>Your Time</h2>
        <p id="time-display">0:00 hours logged</p>
        <table id="time-table" border="1" cellspacing="0" cellpadding="8">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Hours</th>
                </tr>
            </thead>
            <tbody>
            <form>
                <input type="number" id="time-input" placeholder="Enter hours" min="0" step="0.1" required>
                <button type="submit">Add Time</button>
                </form>
            </tbody>
        </table>

    </div>

    <script src="script.js"></script>
</body>
</html>
